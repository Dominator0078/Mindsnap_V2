<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindSnap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div id="ghost-match" class="ghost-match" aria-hidden="true">
      <div id="ghost-grid" class="ghost-grid"></div>
    </div>

    <main class="home-main">
      <section class="home-card">
        <div class="card-top">
          <p class="eyebrow">MEMORY GRID CHALLENGE</p>
          <button id="help-btn" class="help-btn" type="button" aria-label="How to play MindSnap">?</button>
        </div>
        <h1>MindSnap</h1>
        <p class="tagline">Memorize. Tap. Climb. Choose solo focus or duel against a variable bot.</p>

        <div class="setting-grid">
          <label class="setting">
            <span>Difficulty</span>
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>

          <label class="setting">
            <span>Game Time</span>
            <input id="duration" type="number" min="60" max="120" step="1" value="60" />
          </label>
        </div>

        <div class="action-row">
          <button id="solo-btn" class="action-btn">Solo</button>
          <button id="duel-btn" class="action-btn duel">Duels (Bot)</button>
        </div>
      </section>
    </main>

    <div id="tour-overlay" class="tour-overlay" hidden>
      <div class="tour-card" role="dialog" aria-modal="true" aria-labelledby="tour-title">
        <div class="tour-head">
          <h2 id="tour-title">How To Play MindSnap</h2>
          <button id="tour-close" class="tour-close" type="button" aria-label="Close tutorial">x</button>
        </div>
        <div id="tour-stage" class="tour-stage">
          <img src="onboarding.png" alt="MindSnap gameplay visual guide" />
          <div id="tour-dim-top" class="tour-dim top"></div>
          <div id="tour-dim-right" class="tour-dim right"></div>
          <div id="tour-dim-bottom" class="tour-dim bottom"></div>
          <div id="tour-dim-left" class="tour-dim left"></div>
          <div id="tour-focus" class="tour-focus"></div>
        </div>
        <p id="tour-caption" class="tour-caption"></p>
        <div class="tour-controls">
          <button id="tour-prev" type="button" class="tour-btn ghost">Back</button>
          <span id="tour-step" class="tour-step"></span>
          <button id="tour-next" type="button" class="tour-btn">Next</button>
        </div>
      </div>
    </div>

    <script>
      const ghostGrid = document.getElementById("ghost-grid");
      const ghostMatch = document.getElementById("ghost-match");

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function pickInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function rebuildGhostGrid() {
        const w = Math.max(320, window.innerWidth || 0);
        const h = Math.max(320, window.innerHeight || 0);

        const cell = Math.max(34, Math.min(56, Math.round(Math.min(w, h) / 18)));
        const cols = Math.max(10, Math.ceil((w * 1.3) / cell));
        const rows = Math.max(12, Math.ceil((h * 1.3) / cell));

        ghostGrid.style.setProperty("--cell", `${cell}px`);
        ghostGrid.style.setProperty("--cols", String(cols));
        ghostGrid.style.setProperty("--rows", String(rows));

        const total = cols * rows;
        ghostGrid.textContent = "";
        const frag = document.createDocumentFragment();
        for (let i = 0; i < total; i += 1) {
          const tile = document.createElement("div");
          tile.className = "ghost-tile";
          frag.appendChild(tile);
        }
        ghostGrid.appendChild(frag);

        return { cols, rows, total };
      }

      function indexFromRC(r, c, cols) {
        return r * cols + c;
      }

      function neighbors(r, c, rows, cols) {
        const out = [];
        if (r > 0) out.push([r - 1, c]);
        if (r + 1 < rows) out.push([r + 1, c]);
        if (c > 0) out.push([r, c - 1]);
        if (c + 1 < cols) out.push([r, c + 1]);
        return out;
      }

      function pickCluster(size, rows, cols) {
        const centerR = pickInt(0, rows - 1);
        const centerC = pickInt(0, cols - 1);

        const picked = new Set([indexFromRC(centerR, centerC, cols)]);
        const frontier = [[centerR, centerC]];

        while (picked.size < size && frontier.length > 0) {
          const [r, c] = frontier.splice(pickInt(0, frontier.length - 1), 1)[0];
          for (const [nr, nc] of neighbors(r, c, rows, cols)) {
            if (picked.size >= size) break;
            const idx = indexFromRC(nr, nc, cols);
            if (picked.has(idx)) continue;
            if (Math.random() < 0.62) {
              picked.add(idx);
              frontier.push([nr, nc]);
            }
          }
        }

        // Fallback: pad with random near-center tiles if the cluster didn't fill.
        while (picked.size < size) {
          const rr = clamp(centerR + pickInt(-2, 2), 0, rows - 1);
          const cc = clamp(centerC + pickInt(-2, 2), 0, cols - 1);
          picked.add(indexFromRC(rr, cc, cols));
        }

        return Array.from(picked);
      }

      function clearGhostMarks() {
        const tiles = ghostGrid.children;
        for (let i = 0; i < tiles.length; i += 1) {
          tiles[i].classList.remove("is-preview", "is-correct");
        }
      }

      let ghostRunId = 0;
      async function runGhostLoop(dimensions) {
        const runId = ++ghostRunId;
        let { cols, rows } = dimensions;

        while (runId === ghostRunId) {
          if (document.visibilityState === "hidden") {
            await sleep(250);
            continue;
          }

          // Sync with current grid size in case of rebuilds.
          cols = Number(ghostGrid.style.getPropertyValue("--cols")) || cols;
          rows = Number(ghostGrid.style.getPropertyValue("--rows")) || rows;

          const clusterSize = pickInt(4, 6);
          const cluster = pickCluster(clusterSize, rows, cols);
          const tiles = ghostGrid.children;

          // Preview flash (pattern shown)
          for (const idx of cluster) tiles[idx]?.classList.add("is-preview");
          await sleep(1500);
          for (const idx of cluster) tiles[idx]?.classList.remove("is-preview");

          // Correct taps one-by-one (pattern recalled)
          for (const idx of cluster) {
            tiles[idx]?.classList.add("is-correct");
            await sleep(pickInt(90, 140));
          }

          await sleep(1000);
          clearGhostMarks();
          await sleep(pickInt(220, 420));
        }
      }

      let ghostDims = rebuildGhostGrid();
      runGhostLoop(ghostDims);
      window.addEventListener("resize", () => {
        ghostDims = rebuildGhostGrid();
        runGhostLoop(ghostDims);
      });

      function launch(mode) {
        const difficulty = document.getElementById("difficulty").value;
        const duration = document.getElementById("duration").value;
        const target = `mind_snap.html?mode=${encodeURIComponent(mode)}&difficulty=${encodeURIComponent(difficulty)}&duration=${encodeURIComponent(duration)}`;
        window.location.href = target;
      }

      const tourOverlay = document.getElementById("tour-overlay");
      const tourStage = document.getElementById("tour-stage");
      const tourImage = tourStage.querySelector("img");
      const tourFocus = document.getElementById("tour-focus");
      const tourCaption = document.getElementById("tour-caption");
      const tourStep = document.getElementById("tour-step");
      const tourPrev = document.getElementById("tour-prev");
      const tourNext = document.getElementById("tour-next");
      const tourClose = document.getElementById("tour-close");
      const helpBtn = document.getElementById("help-btn");
      const dimTop = document.getElementById("tour-dim-top");
      const dimRight = document.getElementById("tour-dim-right");
      const dimBottom = document.getElementById("tour-dim-bottom");
      const dimLeft = document.getElementById("tour-dim-left");

      const steps = [
        {
          caption: "This top strip is the current game stats. Track mode, difficulty, and time left.",
          rect: { x: 0.5, y: 1, w: 99, h: 13 }
        },
        {
          caption: "This is your player card. Your final score grows pattern by pattern.",
          rect: { x: 0.5, y: 14, w: 23, h: 78 }
        },
        {
          caption: "This center board is the memory arena. Pattern flashes, then you tap from memory.",
          rect: { x: 25, y: 14, w: 50, h: 78 }
        },
        {
          caption: "This is the bot card in duels mode. Beat this score before time runs out.",
          rect: { x: 76.5, y: 14, w: 23, h: 78 }
        },
        {
          caption: "How to play: memorize blue pattern -> tap with limited clicks -> correct +2, wrong -1 -> each pattern adds max(0, raw) to total.",
          rect: { x: 0.5, y: 1, w: 99, h: 98 }
        }
      ];

      let currentStep = 0;

      function getImageFrameRect() {
        const stage = tourStage.getBoundingClientRect();
        const naturalW = tourImage.naturalWidth || stage.width;
        const naturalH = tourImage.naturalHeight || stage.height;

        if (!naturalW || !naturalH) {
          return { x: 0, y: 0, w: stage.width, h: stage.height, stageW: stage.width, stageH: stage.height };
        }

        const stageRatio = stage.width / stage.height;
        const imageRatio = naturalW / naturalH;

        let drawW = stage.width;
        let drawH = stage.height;
        let offsetX = 0;
        let offsetY = 0;

        if (stageRatio > imageRatio) {
          drawH = stage.height;
          drawW = drawH * imageRatio;
          offsetX = (stage.width - drawW) / 2;
        } else {
          drawW = stage.width;
          drawH = drawW / imageRatio;
          offsetY = (stage.height - drawH) / 2;
        }

        return { x: offsetX, y: offsetY, w: drawW, h: drawH, stageW: stage.width, stageH: stage.height };
      }

      function applyStep(index) {
        const safeIndex = Math.max(0, Math.min(index, steps.length - 1));
        currentStep = safeIndex;
        const step = steps[currentStep];
        const frame = getImageFrameRect();

        const x = frame.x + (step.rect.x / 100) * frame.w;
        const y = frame.y + (step.rect.y / 100) * frame.h;
        const w = (step.rect.w / 100) * frame.w;
        const h = (step.rect.h / 100) * frame.h;

        tourFocus.style.left = `${x}px`;
        tourFocus.style.top = `${y}px`;
        tourFocus.style.width = `${w}px`;
        tourFocus.style.height = `${h}px`;

        dimTop.style.left = "0px";
        dimTop.style.top = "0px";
        dimTop.style.width = `${frame.stageW}px`;
        dimTop.style.height = `${y}px`;

        dimRight.style.left = `${x + w}px`;
        dimRight.style.top = `${y}px`;
        dimRight.style.width = `${Math.max(0, frame.stageW - (x + w))}px`;
        dimRight.style.height = `${h}px`;

        dimBottom.style.left = "0px";
        dimBottom.style.top = `${y + h}px`;
        dimBottom.style.width = `${frame.stageW}px`;
        dimBottom.style.height = `${Math.max(0, frame.stageH - (y + h))}px`;

        dimLeft.style.left = "0px";
        dimLeft.style.top = `${y}px`;
        dimLeft.style.width = `${x}px`;
        dimLeft.style.height = `${h}px`;

        tourCaption.textContent = step.caption;
        tourStep.textContent = `Step ${currentStep + 1} / ${steps.length}`;
        tourPrev.disabled = currentStep === 0;
        tourNext.textContent = currentStep === steps.length - 1 ? "Finish" : "Next";
      }

      function openTour() {
        tourOverlay.hidden = false;
        applyStep(0);
      }

      function closeTour() {
        tourOverlay.hidden = true;
      }

      // Keep onboarding hidden until the user explicitly opens it.
      tourOverlay.hidden = true;
      helpBtn.addEventListener("click", openTour);
      tourClose.addEventListener("click", closeTour);
      tourPrev.addEventListener("click", closeTour);
      tourNext.addEventListener("click", () => {
        if (currentStep === steps.length - 1) {
          closeTour();
          return;
        }
        applyStep(currentStep + 1);
      });
      tourStage.addEventListener("click", () => {
        if (currentStep === steps.length - 1) {
          closeTour();
          return;
        }
        applyStep(currentStep + 1);
      });
      tourImage.addEventListener("load", () => {
        if (!tourOverlay.hidden) {
          applyStep(currentStep);
        }
      });
      window.addEventListener("resize", () => {
        if (!tourOverlay.hidden) {
          applyStep(currentStep);
        }
      });
      tourOverlay.addEventListener("click", (event) => {
        if (event.target === tourOverlay) {
          closeTour();
        }
      });

      document.getElementById("solo-btn").addEventListener("click", () => launch("solo"));
      document.getElementById("duel-btn").addEventListener("click", () => launch("duel"));
    </script>
  </body>
</html>
