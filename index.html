<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindSnap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="home.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div id="ghost-match" class="ghost-match" aria-hidden="true">
      <div id="ghost-grid" class="ghost-grid"></div>
    </div>

    <div id="name-modal" class="name-modal" role="dialog" aria-modal="true" aria-labelledby="name-title" hidden>
      <div class="name-card">
        <h2 id="name-title">Enter your name</h2>
        <p class="name-sub">This name shows up in multiplayer matchmaking.</p>
        <form id="name-form" class="name-form">
          <input id="player-name" class="name-input" type="text" inputmode="text" autocomplete="nickname" maxlength="16" placeholder="Your name" required />
          <button class="name-btn" type="submit">Continue</button>
        </form>
        <p id="name-error" class="name-error" aria-live="polite"></p>
      </div>
    </div>

    <div id="radar-overlay" class="radar-overlay" hidden>
      <div class="radar-card" role="status" aria-live="polite">
        <div class="radar-visual" aria-hidden="true">
          <div class="radar-sweep"></div>
          <div class="radar-ring ring-1"></div>
          <div class="radar-ring ring-2"></div>
          <div class="radar-ring ring-3"></div>
          <div class="radar-blips" id="radar-blips"></div>
        </div>
        <h2 class="radar-title">Scanning for players…</h2>
        <p id="radar-sub" class="radar-sub">Hold tight. Match starts automatically.</p>
        <button id="radar-cancel" class="radar-cancel" type="button">Cancel</button>
      </div>
    </div>

    <main class="home-main">
      <section class="home-card">
        <div class="card-top">
          <p class="eyebrow">MEMORY GRID CHALLENGE</p>
          <button id="help-btn" class="help-btn" type="button" aria-label="How to play MindSnap">?</button>
        </div>
        <h1>MindSnap</h1>
        <p class="tagline">Memorize. Tap. Climb. Choose solo focus or duel against a variable bot.</p>

        <div class="setting-grid">
          <label class="setting">
            <span>Difficulty</span>
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>

          <label class="setting">
            <span>Game Time</span>
            <input id="duration" type="number" min="60" max="120" step="1" value="60" />
          </label>
        </div>

        <div class="action-row">
          <button id="solo-btn" class="action-btn">Solo</button>
          <button id="duel-btn" class="action-btn duel">Duels (Bot)</button>
          <button id="multi-btn" class="action-btn multi">Multiplayer</button>
        </div>
      </section>
    </main>

    <div id="tour-overlay" class="tour-overlay" hidden>
      <div class="tour-card" role="dialog" aria-modal="true" aria-labelledby="tour-title">
        <div class="tour-head">
          <h2 id="tour-title">How To Play MindSnap</h2>
          <button id="tour-close" class="tour-close" type="button" aria-label="Close tutorial">x</button>
        </div>
        <div id="tour-stage" class="tour-stage">
          <img src="onboarding.png" alt="MindSnap gameplay visual guide" />
          <div id="tour-dim-top" class="tour-dim top"></div>
          <div id="tour-dim-right" class="tour-dim right"></div>
          <div id="tour-dim-bottom" class="tour-dim bottom"></div>
          <div id="tour-dim-left" class="tour-dim left"></div>
          <div id="tour-focus" class="tour-focus"></div>
        </div>
        <p id="tour-caption" class="tour-caption"></p>
        <div class="tour-controls">
          <button id="tour-prev" type="button" class="tour-btn ghost">Back</button>
          <span id="tour-step" class="tour-step"></span>
          <button id="tour-next" type="button" class="tour-btn">Next</button>
        </div>
      </div>
    </div>

    <script>
      const ghostGrid = document.getElementById("ghost-grid");
      const ghostMatch = document.getElementById("ghost-match");

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function pickInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function rebuildGhostGrid() {
        const w = Math.max(320, window.innerWidth || 0);
        const h = Math.max(320, window.innerHeight || 0);

        const cell = Math.max(34, Math.min(56, Math.round(Math.min(w, h) / 18)));
        const cols = Math.max(10, Math.ceil((w * 1.3) / cell));
        const rows = Math.max(12, Math.ceil((h * 1.3) / cell));

        ghostGrid.style.setProperty("--cell", `${cell}px`);
        ghostGrid.style.setProperty("--cols", String(cols));
        ghostGrid.style.setProperty("--rows", String(rows));

        const total = cols * rows;
        ghostGrid.textContent = "";
        const frag = document.createDocumentFragment();
        for (let i = 0; i < total; i += 1) {
          const tile = document.createElement("div");
          tile.className = "ghost-tile";
          frag.appendChild(tile);
        }
        ghostGrid.appendChild(frag);

        return { cols, rows, total };
      }

      function indexFromRC(r, c, cols) {
        return r * cols + c;
      }

      function neighbors(r, c, rows, cols) {
        const out = [];
        if (r > 0) out.push([r - 1, c]);
        if (r + 1 < rows) out.push([r + 1, c]);
        if (c > 0) out.push([r, c - 1]);
        if (c + 1 < cols) out.push([r, c + 1]);
        return out;
      }

      function pickCluster(size, rows, cols) {
        const centerR = pickInt(0, rows - 1);
        const centerC = pickInt(0, cols - 1);

        const picked = new Set([indexFromRC(centerR, centerC, cols)]);
        const frontier = [[centerR, centerC]];

        while (picked.size < size && frontier.length > 0) {
          const [r, c] = frontier.splice(pickInt(0, frontier.length - 1), 1)[0];
          for (const [nr, nc] of neighbors(r, c, rows, cols)) {
            if (picked.size >= size) break;
            const idx = indexFromRC(nr, nc, cols);
            if (picked.has(idx)) continue;
            if (Math.random() < 0.62) {
              picked.add(idx);
              frontier.push([nr, nc]);
            }
          }
        }

        // Fallback: pad with random near-center tiles if the cluster didn't fill.
        while (picked.size < size) {
          const rr = clamp(centerR + pickInt(-2, 2), 0, rows - 1);
          const cc = clamp(centerC + pickInt(-2, 2), 0, cols - 1);
          picked.add(indexFromRC(rr, cc, cols));
        }

        return Array.from(picked);
      }

      function clearGhostMarks() {
        const tiles = ghostGrid.children;
        for (let i = 0; i < tiles.length; i += 1) {
          tiles[i].classList.remove("is-preview", "is-correct");
        }
      }

      let ghostRunId = 0;
      async function runGhostLoop(dimensions) {
        const runId = ++ghostRunId;
        let { cols, rows } = dimensions;

        while (runId === ghostRunId) {
          if (document.visibilityState === "hidden") {
            await sleep(250);
            continue;
          }

          // Sync with current grid size in case of rebuilds.
          cols = Number(ghostGrid.style.getPropertyValue("--cols")) || cols;
          rows = Number(ghostGrid.style.getPropertyValue("--rows")) || rows;

          const clusterSize = pickInt(4, 6);
          const cluster = pickCluster(clusterSize, rows, cols);
          const tiles = ghostGrid.children;

          // Preview flash (pattern shown)
          for (const idx of cluster) tiles[idx]?.classList.add("is-preview");
          await sleep(1500);
          for (const idx of cluster) tiles[idx]?.classList.remove("is-preview");

          // Correct taps one-by-one (pattern recalled)
          for (const idx of cluster) {
            tiles[idx]?.classList.add("is-correct");
            await sleep(pickInt(90, 140));
          }

          await sleep(1000);
          clearGhostMarks();
          await sleep(pickInt(220, 420));
        }
      }

      let ghostDims = rebuildGhostGrid();
      runGhostLoop(ghostDims);
      window.addEventListener("resize", () => {
        ghostDims = rebuildGhostGrid();
        runGhostLoop(ghostDims);
      });

      const SUPABASE_URL = "https://kqhgodyuzcxilurksigq.supabase.co";
      const SUPABASE_KEY = "sb_publishable_vT7txYsSlcpDbOfOsuqh9Q_-aTrvWAU";

      const NAME_KEY = "mindsnap_name_v1";
      const CLIENT_KEY = "mindsnap_client_id_v1";

      const nameModal = document.getElementById("name-modal");
      const nameForm = document.getElementById("name-form");
      const nameInput = document.getElementById("player-name");
      const nameError = document.getElementById("name-error");

      const radarOverlay = document.getElementById("radar-overlay");
      const radarCancel = document.getElementById("radar-cancel");
      const radarSub = document.getElementById("radar-sub");
      const radarBlips = document.getElementById("radar-blips");

      const MIN_SCAN_MS = 3000;
      const MATCH_START_DELAY_MS = 1200;

      function safeName(raw) {
        const trimmed = String(raw || "").trim().replace(/\s+/g, " ");
        return trimmed.slice(0, 16);
      }

      function ensureClientId() {
        // Use sessionStorage so two tabs can be two distinct players.
        let id = sessionStorage.getItem(CLIENT_KEY) || localStorage.getItem(CLIENT_KEY);
        if (id) return id;
        try {
          id = crypto.randomUUID();
        } catch {
          id = `c_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        }
        sessionStorage.setItem(CLIENT_KEY, id);
        // Best-effort backup for same-tab navigation in older browsers.
        localStorage.setItem(CLIENT_KEY, id);
        return id;
      }

      function ensureName() {
        const existing = localStorage.getItem(NAME_KEY);
        if (existing && safeName(existing)) return safeName(existing);
        return null;
      }

      function openNameModal() {
        nameModal.hidden = false;
        nameInput.value = "";
        nameInput.focus();
      }

      function closeNameModal() {
        nameModal.hidden = true;
      }

      const clientId = ensureClientId();
      let playerName = ensureName();
      if (!playerName) openNameModal();

      nameForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const value = safeName(nameInput.value);
        if (!value) {
          nameError.textContent = "Please enter a name.";
          return;
        }
        playerName = value;
        localStorage.setItem(NAME_KEY, playerName);
        nameError.textContent = "";
        closeNameModal();
      });

      // Multiplayer (Supabase Realtime Presence + Broadcast)
      const DEBUG_MP = true;
      let supa = null;
      let lobbyChannel = null;
      let lobbyState = new Map(); // clientId -> meta
      let scanning = false;
      let scanStartedAt = 0;
      let matchCommitted = false;
      let lastMatchId = null;
      let leaderPayload = null;
      let scanPollId = null;

      function rebuildBlips() {
        radarBlips.textContent = "";
        const searching = Array.from(lobbyState.values()).filter((m) => m.status === "searching");
        const count = clamp(searching.length, 0, 10);
        for (let i = 0; i < count; i += 1) {
          const blip = document.createElement("span");
          blip.className = "radar-blip";
          blip.style.left = `${10 + Math.random() * 80}%`;
          blip.style.top = `${12 + Math.random() * 76}%`;
          blip.style.animationDelay = `${Math.random() * 0.8}s`;
          radarBlips.appendChild(blip);
        }
      }

      function setRadar(open) {
        radarOverlay.hidden = !open;
        if (open) rebuildBlips();
      }

      function lobbyMetasFromPresenceState(stateObj) {
        const metas = [];
        for (const key of Object.keys(stateObj || {})) {
          const entry = stateObj[key];
          if (Array.isArray(entry)) {
            for (const meta of entry) metas.push(meta);
            continue;
          }
          if (Array.isArray(entry?.metas)) {
            for (const meta of entry.metas) metas.push(meta);
            continue;
          }
          if (entry && typeof entry === "object") metas.push(entry);
        }
        return metas;
      }

      function updateLobbyFromPresence() {
        lobbyState.clear();
        const metas = lobbyMetasFromPresenceState(lobbyChannel.presenceState());
        for (const meta of metas) {
          if (!meta?.clientId) continue;
          lobbyState.set(meta.clientId, meta);
        }
        if (scanning) {
          const searchingCount = Array.from(lobbyState.values()).filter((m) => m.status === "searching").length;
          radarSub.textContent = `Scanning… ${searchingCount} player${searchingCount === 1 ? "" : "s"} searching`;
          if (DEBUG_MP) console.log("[MP] presence sync", { searchingCount, total: lobbyState.size });
          rebuildBlips();
          maybeMatchmake();
        }
      }

      function getSettings() {
        const difficulty = document.getElementById("difficulty").value;
        const duration = document.getElementById("duration").value;
        return { difficulty, duration: Number(duration) };
      }

      function setPresenceStatus(status, extra = {}) {
        if (!lobbyChannel) return;
        lobbyChannel.track({
          clientId,
          name: playerName || "Player",
          status,
          settings: getSettings(),
          updatedAt: new Date().toISOString(),
          ...extra
        });
      }

      function getSearchingIds() {
        return Array.from(lobbyState.values())
          .filter((m) => m.status === "searching" && m.clientId)
          .map((m) => m.clientId)
          .sort();
      }

      function pairForMe(ids) {
        for (let i = 0; i + 1 < ids.length; i += 2) {
          const a = ids[i];
          const b = ids[i + 1];
          if (a === clientId) return { leader: a, other: b };
          if (b === clientId) return { leader: a, other: b };
        }
        return null;
      }

      async function waitForMinScan() {
        const elapsed = Date.now() - scanStartedAt;
        const remaining = Math.max(0, MIN_SCAN_MS - elapsed);
        if (remaining > 0) await sleep(remaining);
      }

      function navigateToPvP(startPayload) {
        const { matchId, seed, startAt, difficulty, duration, p1, p2 } = startPayload;
        const q = new URLSearchParams({
          mode: "pvp",
          matchId,
          seed: String(seed),
          startAt: String(startAt),
          difficulty,
          duration: String(duration),
          p1: `${p1.clientId}|${p1.name}`,
          p2: `${p2.clientId}|${p2.name}`
        });
        window.location.href = `mind_snap.html?${q.toString()}`;
      }

      async function commitMatch(startPayload) {
        if (matchCommitted) return;
        matchCommitted = true;
        lastMatchId = startPayload.matchId;
        radarSub.textContent = "Match found. Synchronizing…";
        setPresenceStatus("in_match", { matchId: startPayload.matchId });
        await waitForMinScan();
        navigateToPvP(startPayload);
      }

      function makeMatchStartPayload(leaderId, otherId) {
        const leaderMeta = lobbyState.get(leaderId);
        const otherMeta = lobbyState.get(otherId);
        const settings = leaderMeta?.settings || getSettings();
        const now = Date.now();
        const matchId = crypto?.randomUUID?.() || `m_${now}_${Math.random().toString(16).slice(2)}`;
        const seed = Math.floor(Math.random() * 0x7fffffff);
        return {
          matchId,
          seed,
          startAt: now + MATCH_START_DELAY_MS,
          difficulty: settings.difficulty || "medium",
          duration: Number(settings.duration || 60),
          p1: { clientId: leaderId, name: leaderMeta?.name || "Player 1" },
          p2: { clientId: otherId, name: otherMeta?.name || "Player 2" }
        };
      }

      async function maybeMatchmake() {
        if (!scanning || matchCommitted) return;
        const searchingIds = getSearchingIds();
        const pair = pairForMe(searchingIds);
        if (!pair) return;

        // If I'm the leader, broadcast match_start exactly once per pairing.
        if (pair.leader === clientId && !lastMatchId) {
          const payload = makeMatchStartPayload(pair.leader, pair.other);
          lastMatchId = payload.matchId;
          leaderPayload = payload;
          await lobbyChannel.send({
            type: "broadcast",
            event: "match_start",
            payload
          });
          // local fast-path
          commitMatch(payload);
          return;
        }

        // Non-leader: nudge the leader in case the initial broadcast is delayed/missed.
        if (pair.leader !== clientId && !lastMatchId) {
          lastMatchId = "waiting";
          setTimeout(() => {
            if (!scanning || matchCommitted) return;
            lobbyChannel.send({
              type: "broadcast",
              event: "match_request",
              payload: { from: clientId, to: pair.leader }
            });
          }, 380);
          setTimeout(() => {
            if (lastMatchId === "waiting" && !matchCommitted) lastMatchId = null;
          }, 2200);
        }
      }

      async function startScanning() {
        if (scanning) return;
        if (!playerName) {
          openNameModal();
          return;
        }

        scanning = true;
        matchCommitted = false;
        lastMatchId = null;
        leaderPayload = null;
        scanStartedAt = Date.now();
        setRadar(true);
        radarSub.textContent = "Hold tight. Match starts automatically.";

        if (!supa) {
          const { createClient } = supabase;
          supa = createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        if (!lobbyChannel) {
          lobbyChannel = supa.channel("mindsnap:lobby", {
            config: {
              broadcast: { self: true, ack: true },
              presence: { key: clientId }
            }
          });

          lobbyChannel
            .on("presence", { event: "sync" }, updateLobbyFromPresence)
            .on("presence", { event: "join" }, updateLobbyFromPresence)
            .on("presence", { event: "leave" }, updateLobbyFromPresence)
            .on("broadcast", { event: "match_start" }, ({ payload }) => {
              if (!scanning || matchCommitted) return;
              const p1 = payload?.p1?.clientId;
              const p2 = payload?.p2?.clientId;
              if (p1 !== clientId && p2 !== clientId) return;
              commitMatch(payload);
            })
            .on("broadcast", { event: "match_request" }, async ({ payload }) => {
              if (!scanning || matchCommitted) return;
              if (!payload || payload.to !== clientId) return;
              if (!leaderPayload) return;
              await lobbyChannel.send({ type: "broadcast", event: "match_start", payload: leaderPayload });
            })
            .subscribe(async (status) => {
              if (DEBUG_MP) console.log("[MP] lobby status", status);
              if (status === "SUBSCRIBED") {
                setPresenceStatus("searching");
                updateLobbyFromPresence();
                return;
              }
              if (status === "CHANNEL_ERROR") {
                radarSub.textContent = "Multiplayer error. Please retry.";
                scanning = false;
              }
            });
        } else {
          setPresenceStatus("searching");
          updateLobbyFromPresence();
        }

        if (scanPollId) clearInterval(scanPollId);
        scanPollId = setInterval(() => {
          if (!scanning || !lobbyChannel) return;
          updateLobbyFromPresence();
          maybeMatchmake();
        }, 500);
      }

      function stopScanning() {
        scanning = false;
        matchCommitted = false;
        lastMatchId = null;
        leaderPayload = null;
        setRadar(false);
        if (lobbyChannel) setPresenceStatus("idle");
        if (scanPollId) {
          clearInterval(scanPollId);
          scanPollId = null;
        }
      }

      radarCancel.addEventListener("click", stopScanning);

      function launch(mode) {
        const difficulty = document.getElementById("difficulty").value;
        const duration = document.getElementById("duration").value;
        const target = `mind_snap.html?mode=${encodeURIComponent(mode)}&difficulty=${encodeURIComponent(difficulty)}&duration=${encodeURIComponent(duration)}`;
        window.location.href = target;
      }

      const tourOverlay = document.getElementById("tour-overlay");
      const tourStage = document.getElementById("tour-stage");
      const tourImage = tourStage.querySelector("img");
      const tourFocus = document.getElementById("tour-focus");
      const tourCaption = document.getElementById("tour-caption");
      const tourStep = document.getElementById("tour-step");
      const tourPrev = document.getElementById("tour-prev");
      const tourNext = document.getElementById("tour-next");
      const tourClose = document.getElementById("tour-close");
      const helpBtn = document.getElementById("help-btn");
      const dimTop = document.getElementById("tour-dim-top");
      const dimRight = document.getElementById("tour-dim-right");
      const dimBottom = document.getElementById("tour-dim-bottom");
      const dimLeft = document.getElementById("tour-dim-left");

      const steps = [
        {
          caption: "This top strip is the current game stats. Track mode, difficulty, and time left.",
          rect: { x: 0.5, y: 1, w: 99, h: 13 }
        },
        {
          caption: "This is your player card. Your final score grows pattern by pattern.",
          rect: { x: 0.5, y: 14, w: 23, h: 78 }
        },
        {
          caption: "This center board is the memory arena. Pattern flashes, then you tap from memory.",
          rect: { x: 25, y: 14, w: 50, h: 78 }
        },
        {
          caption: "This is the bot card in duels mode. Beat this score before time runs out.",
          rect: { x: 76.5, y: 14, w: 23, h: 78 }
        },
        {
          caption: "How to play: memorize blue pattern -> tap with limited clicks -> correct +2, wrong -1 -> each pattern adds max(0, raw) to total.",
          rect: { x: 0.5, y: 1, w: 99, h: 98 }
        }
      ];

      let currentStep = 0;

      function getImageFrameRect() {
        const stage = tourStage.getBoundingClientRect();
        const naturalW = tourImage.naturalWidth || stage.width;
        const naturalH = tourImage.naturalHeight || stage.height;

        if (!naturalW || !naturalH) {
          return { x: 0, y: 0, w: stage.width, h: stage.height, stageW: stage.width, stageH: stage.height };
        }

        const stageRatio = stage.width / stage.height;
        const imageRatio = naturalW / naturalH;

        let drawW = stage.width;
        let drawH = stage.height;
        let offsetX = 0;
        let offsetY = 0;

        if (stageRatio > imageRatio) {
          drawH = stage.height;
          drawW = drawH * imageRatio;
          offsetX = (stage.width - drawW) / 2;
        } else {
          drawW = stage.width;
          drawH = drawW / imageRatio;
          offsetY = (stage.height - drawH) / 2;
        }

        return { x: offsetX, y: offsetY, w: drawW, h: drawH, stageW: stage.width, stageH: stage.height };
      }

      function applyStep(index) {
        const safeIndex = Math.max(0, Math.min(index, steps.length - 1));
        currentStep = safeIndex;
        const step = steps[currentStep];
        const frame = getImageFrameRect();

        const x = frame.x + (step.rect.x / 100) * frame.w;
        const y = frame.y + (step.rect.y / 100) * frame.h;
        const w = (step.rect.w / 100) * frame.w;
        const h = (step.rect.h / 100) * frame.h;

        tourFocus.style.left = `${x}px`;
        tourFocus.style.top = `${y}px`;
        tourFocus.style.width = `${w}px`;
        tourFocus.style.height = `${h}px`;

        dimTop.style.left = "0px";
        dimTop.style.top = "0px";
        dimTop.style.width = `${frame.stageW}px`;
        dimTop.style.height = `${y}px`;

        dimRight.style.left = `${x + w}px`;
        dimRight.style.top = `${y}px`;
        dimRight.style.width = `${Math.max(0, frame.stageW - (x + w))}px`;
        dimRight.style.height = `${h}px`;

        dimBottom.style.left = "0px";
        dimBottom.style.top = `${y + h}px`;
        dimBottom.style.width = `${frame.stageW}px`;
        dimBottom.style.height = `${Math.max(0, frame.stageH - (y + h))}px`;

        dimLeft.style.left = "0px";
        dimLeft.style.top = `${y}px`;
        dimLeft.style.width = `${x}px`;
        dimLeft.style.height = `${h}px`;

        tourCaption.textContent = step.caption;
        tourStep.textContent = `Step ${currentStep + 1} / ${steps.length}`;
        tourPrev.disabled = currentStep === 0;
        tourNext.textContent = currentStep === steps.length - 1 ? "Finish" : "Next";
      }

      function openTour() {
        tourOverlay.hidden = false;
        applyStep(0);
      }

      function closeTour() {
        tourOverlay.hidden = true;
      }

      // Keep onboarding hidden until the user explicitly opens it.
      tourOverlay.hidden = true;
      helpBtn.addEventListener("click", openTour);
      tourClose.addEventListener("click", closeTour);
      tourPrev.addEventListener("click", closeTour);
      tourNext.addEventListener("click", () => {
        if (currentStep === steps.length - 1) {
          closeTour();
          return;
        }
        applyStep(currentStep + 1);
      });
      tourStage.addEventListener("click", () => {
        if (currentStep === steps.length - 1) {
          closeTour();
          return;
        }
        applyStep(currentStep + 1);
      });
      tourImage.addEventListener("load", () => {
        if (!tourOverlay.hidden) {
          applyStep(currentStep);
        }
      });
      window.addEventListener("resize", () => {
        if (!tourOverlay.hidden) {
          applyStep(currentStep);
        }
      });
      tourOverlay.addEventListener("click", (event) => {
        if (event.target === tourOverlay) {
          closeTour();
        }
      });

      document.getElementById("solo-btn").addEventListener("click", () => launch("solo"));
      document.getElementById("duel-btn").addEventListener("click", () => launch("duel"));
      document.getElementById("multi-btn").addEventListener("click", startScanning);
    </script>
  </body>
</html>
